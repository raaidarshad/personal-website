content:
  - name: music
    label: Music
    path: content/music
    type: collection
    filename: '{primary}.mdx'
    fields:
      - name: name
        label: Song Name
        type: string
      - name: version
        label: Version
        type: string
      - name: audio_file_url
        label: Audio File URL
        type: string
      - name: featured
        label: Featured
        type: boolean
      - name: description
        label: Description
        type: rich-text
  - name: posts
    label: Posts
    path: pages/posts
    type: collection
    filename: '{primary}.mdx'
    fields:
      - name: title
        label: Title
        type: string
      - name: date
        label: Date
        type: date
        options:
          format: yyyy-MM-dd
      - name: description
        label: Description
        type: string
      - name: tag
        label: Tag
        type: string
      - name: body
        label: Body
        type: rich-text
      - name: author
        label: Author
        type: string
        default: Raaid
  - name: about
    label: About
    path: pages/index.mdx
    type: file
    fields:
      - name: type
        label: Type
        type: string
      - name: title
        label: Title
        type: string
      - name: date
        label: Date
        type: date
        options:
          format: yyyy-MM-dd
      - name: body
        label: Body
        type: rich-text
  - name: blog
    label: Blog
    path: pages/posts/index.mdx
    type: file
    fields:
      - name: type
        label: Type
        type: string
      - name: title
        label: Title
        type: string
      - name: date
        label: Date
        type: date
        options:
          format: yyyy-MM-dd
      - name: body
        label: Body
        type: rich-text
  - name: projects
    label: Projects
    path: pages/posts/projects.mdx
    type: file
    fields:
      - name: type
        label: Type
        type: string
      - name: title
        label: Title
        type: string
      - name: date
        label: Date
        type: date
        options:
          format: yyyy-MM-dd
      - name: body
        label: Body
        type: rich-text